<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд | Финансы</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div class="container">
        <nav class="navigation">
            <a href="index.html" class="nav-btn">Задачи</a>
            <a href="weather.html" class="nav-btn">Погода</a>
            <a href="finance.html" class="nav-btn active">Финансы</a>
            <a href="crypto.html" class="nav-btn">Крипта</a>
        </nav>

        <h1>Конвертер валют</h1>
        <p class="subtitle">Кросс-курс в реальном времени</p>

        <div class="input-group" style="flex-direction: column; gap: 15px;">
            <input type="text" id="amount" value="100" inputmode="decimal" oninput="this.value = this.value.replace(/,/g, '.').replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1');">
            
            <div style="display: flex; gap: 10px; width: 100%;">
                <select id="from-currency">
                    <option value="RUB">RUB (Рубль)</option>
                    <option value="USD" selected>USD (Доллар)</option>
                    <option value="EUR">EUR (Евро)</option>
                    <option value="CNY">CNY (Юань)</option>
                    <option value="KZT">KZT (Тенге)</option>
                    <option value="UAH">UAH (Гривна)</option>
                    <option value="BYN">BYN (Бел. рубль)</option>
                </select>

                <div style="align-self: center; color: #64748b;">➔</div>

                <select id="to-currency">
                    <option value="RUB" selected>RUB (Рубль)</option>
                    <option value="USD">USD (Доллар)</option>
                    <option value="EUR">EUR (Евро)</option>
                    <option value="CNY">CNY (Юань)</option>
                    <option value="KZT">KZT (Тенге)</option>
                    <option value="UAH">UAH (Гривна)</option>
                    <option value="BYN">BYN (Бел. рубль)</option>
                </select>
            </div>
        </div>

        <div id="finance-result" class="result-box">
            Расчет...
        </div>
        <div class="mobile-spacer"></div>
    </div>
    <script src="scripts/finance.js"></script>
</body>
</html>
